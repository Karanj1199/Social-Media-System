server:
  port: 8080

spring:
  application:
    name: social-media-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/social_media_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
